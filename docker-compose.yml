services:
  db:
    image: mysql:8.0
    restart: always
    environment:
      MYSQL_DATABASE: leave_management
      MYSQL_ALLOW_EMPTY_PASSWORD: 'yes'
    ports:
      - "3306:3306"
    volumes:
      - db_data:/var/lib/mysql

  backend:
    image: bitnami/laravel:11
    volumes:
      - ./backend:/app
    environment:
      - DB_HOST=db
      - DB_PORT=3306
      - DB_DATABASE=leave_management
      - DB_USERNAME=root
      - DB_PASSWORD=
    ports:
      - "8000:8000"
    depends_on:
      - db

volumes:
  db_data:
